# Tắt log INFO từ toàn bộ Kafka client, chỉ hiện WARN trở lên
org.slf4j.simpleLogger.log.org.apache.kafka=WARN

# Mặc định toàn app vẫn hiện INFO (output của bạn)
org.slf4j.simpleLogger.defaultLogLevel=INFO

# Định dạng log gọn hơn (bỏ timestamp và thread nếu muốn)
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
